name: Secret scan

on:
  # ci.yaml から reusable workflow として呼び出される。
  # push / pull_request / workflow_dispatch のトリガーは ci.yaml 側が持つ。
  workflow_call:
    inputs:
      fail-fast:
        description: "失敗時に呼び出し元の run 全体をキャンセルして他の並列チェックを止める"
        type: boolean
        required: false
        default: false
  # 検知ルールの更新を新規 push なしでも取り込むため、main の履歴全体を週次で再スキャンする
  schedule:
    - cron: "0 1 * * 1" # 毎週月曜 01:00 UTC

permissions:
  contents: read
  # fail-fast step (run のキャンセル) に必要。呼び出し元でも同じ権限を付与すること
  # (called workflow の GITHUB_TOKEN は caller の権限を超えられない)
  actions: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f # v8.30.1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        run: gitleaks git --redact -v .

      # fail-fast: run 全体をキャンセルして並列で走る他のチェックを止める。
      # run と各 job の conclusion は cancelled になるが、失敗した step は failure として記録に残る。
      # gitleaks の container 内には gh CLI が無いため github-script で API を叩く。
      - name: Cancel the entire run on failure
        if: failure() && inputs.fail-fast
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
