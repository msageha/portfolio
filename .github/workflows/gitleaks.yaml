name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  # 検知ルールの更新を新規 push なしでも取り込むため、main の履歴全体を週次で再スキャンする
  schedule:
    - cron: "0 1 * * 1" # 毎週月曜 01:00 UTC
  # mise-lock.yaml が GITHUB_TOKEN で push / 作成する PR には workflow run が自動発火しないため、
  # PR head ブランチへ明示的に dispatch できるようにする
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f # v8.30.1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        run: gitleaks git --redact -v .
