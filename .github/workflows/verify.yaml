name: verify

# ci.yaml から reusable workflow として呼び出される。
# push / pull_request / workflow_dispatch のトリガーは ci.yaml 側が持つ。
on:
  workflow_call:
    inputs:
      fail-fast:
        description: "失敗時に呼び出し元の run 全体をキャンセルして他の並列チェックを止める"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  # fail-fast step (gh run cancel) に必要。呼び出し元でも同じ権限を付与すること
  # (called workflow の GITHUB_TOKEN は caller の権限を超えられない)
  actions: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # 注意: Actions の許可設定 (allowed_actions: selected の場合) で
      # jdx/mise-action@* を patterns_allowed に許可しておく必要がある。
      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Cache npm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: mise exec -- npm ci

      - name: Audit dependencies
        run: mise exec -- npm audit --audit-level=high

      # typecheck / lint / format は prek.yaml (pre-commit hooks) が検証する。
      # ここでは prek が扱わない build のみを検証する。

      - name: Build
        run: mise exec -- npm run build

      # fail-fast: run 全体をキャンセルして並列で走る他のチェックを止める。
      # run と各 job の conclusion は cancelled になるが、失敗した step は failure として記録に残る。
      - name: Cancel the entire run on failure
        if: failure() && inputs.fail-fast
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY"
