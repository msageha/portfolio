name: mise lock

on:
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 00:00 UTC
  pull_request:
    paths:
      - mise.toml
      - .node-version
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # PR 作成 / push 後に CI 系 workflow を workflow_dispatch で起動するため (最下段のステップ参照)
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mise-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # push は下段のステップで明示的にトークンを渡して行うため、
      # チェックアウトに認証情報を残さない
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
          persist-credentials: false

      # 注意: Actions の許可設定 (allowed_actions: selected の場合) で
      # jdx/mise-action@* を patterns_allowed に許可しておく必要がある。
      # install: false — 古い mise.lock のまま mise install すると checksum 不一致で
      # 失敗しうるため、mise 本体のみ導入して lock の再生成だけを行う。
      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: false
          cache: false

      # mise.toml / .node-version のバージョン更新は Renovate に任せる。
      # ここでは pin されたバージョンのまま mise.lock の checksum / URL だけを再生成する。
      # .node-version はメジャーのみの指定なので、週次実行が node のパッチ追従を兼ねる。
      - name: Run mise lock
        env:
          # mise の GitHub API アクセス (リリース取得・SLSA 検証) を認証付きにして
          # ランナー共有 IP の無認証 rate limit (60 req/h) を回避する
          GITHUB_TOKEN: ${{ github.token }}
        run: mise lock

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- mise.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Renovate 等が mise.toml / .node-version を変更した既存 PR には、
      # 同じブランチに直接 commit して mise.lock を追従させる。
      # fork からの PR は GITHUB_TOKEN で push できないためスキップする。
      - name: Push mise.lock update to the pull request branch
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mise.lock
          git commit -m "chore: update mise.lock"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$HEAD_REF"

      # schedule / workflow_dispatch では新規に PR を作る。
      - name: Open pull request
        if: steps.diff.outputs.changed == 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B chore/mise-lock
          git add mise.lock
          git commit -m "chore: update mise.lock"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" chore/mise-lock

          if ! gh pr view chore/mise-lock --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr create --repo "$GITHUB_REPOSITORY" --title "chore: update mise.lock" --base main --head chore/mise-lock \
              --body "mise lock の自動実行による mise.lock の更新です。差分を確認してください。"
          fi

      # GITHUB_TOKEN による push / PR 作成からは新しい workflow run が発火しない
      # (再帰実行防止の GitHub 仕様)。workflow_dispatch はその例外なので、
      # 更新したブランチへ CI 系 workflow を明示的に起動して required check を付ける。
      # CI 系チェック (verify / prek / gitleaks) は ci.yaml に集約されているため ci.yaml のみ起動する。
      - name: Dispatch CI workflows for the updated branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || 'chore/mise-lock' }}
        run: gh workflow run ci.yaml --repo "$GITHUB_REPOSITORY" --ref "$TARGET_REF"
