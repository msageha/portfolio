# commit-msg stage の commitlint を動かすため、pre-commit に加えて commit-msg hook も導入する
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint-system
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: system
        # npx --no-install は Windows でも動く (./node_modules/.bin/eslint は非対応)。
        # --max-warnings 0 は package.json の lint スクリプトと判定を揃えるため
        entry: npx --no-install eslint --max-warnings 0
        files: \.(ts|tsx|astro)$|^([^/]+|scripts/.+)\.mjs$
      - id: dprint
        name: dprint
        # language: node により pre-commit/prek が隔離環境へ dprint を自前インストールするため、
        # npm ci なしの CI (prek.yaml) でも動く。バージョンは package.json の devDependencies と同期すること。
        # --allow-no-files: 渡されたファイルがすべて dprint.json の excludes 対象のとき
        # exit 14 (No files found) で失敗しないようにする
        language: node
        entry: dprint fmt --allow-no-files
        additional_dependencies: ["dprint@0.55.2"]
        files: \.(ts|tsx|astro|js|mjs|css|json|md|toml|ya?ml|svg)$
      - id: typecheck
        name: typecheck
        language: system
        entry: npm run typecheck
        files: \.(ts|tsx|astro)$
        pass_filenames: false
      - id: commitlint
        name: commitlint
        language: system
        entry: npx --no -- commitlint --edit
        stages: [commit-msg]
      - id: mise-task-docs
        name: Sync task docs into README.md
        language: system
        entry: mise run docs
        files: ^mise\.toml$
        pass_filenames: false
