# Node のバージョンは .nvmrc を単一の情報源とする (Cloudflare Build も .nvmrc を読む)
# tool のバージョンは Renovate (mise manager) が bump する。latest 指定にしない
[tools]
prek = "0.4.8"
actionlint = "1.7.12"
dprint = "0.55.1"

[tasks.dev]
description = "Start the Astro dev server"
run = "npm run dev"

[tasks.build]
description = "Build the site for production"
run = "npm run build"

[tasks.preview]
description = "Preview the production build"
run = "npm run preview"

[tasks.typecheck]
description = "Run astro check and tsc"
run = "npm run typecheck"

[tasks.format]
description = "Check formatting with prettier"
run = "npm run format"

[tasks."format:fix"]
description = "Fix formatting with prettier"
run = "npm run format:fix"

[tasks.docs]
description = "Sync the task list embedded in README.md with mise.toml"
run = "mise generate task-docs --inject --output README.md"

[hooks]
postinstall = "prek install"

[settings]
idiomatic_version_file_enable_tools = ["node"]
lockfile = true
