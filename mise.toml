# Node のバージョンは .node-version (メジャーのみ指定) が単一ソース (Cloudflare のビルドも参照する)。
# mise には settings.idiomatic_version_file_enable_tools 経由で読み込ませる。
# ツールのバージョンは Renovate (mise manager) が bump する。latest 指定にしない。
# パッチ追従と checksum の再解決は mise-lock.yml (週次) が行う。
[tools]
prek = "0.4.9"
actionlint = "1.7.12"

[env]
# `mise.local.toml` (git 管理外) を併置すると、ローカルだけの値で上書きできる。

[tasks.install]
description = "Install npm dependencies"
run = "npm ci"

[tasks.clean]
description = "Remove build artifacts (dist/, .astro/)"
run = "rm -rf dist .astro"

[tasks.docs]
description = "Sync the task list embedded in README.md with mise.toml"
run = "mise generate task-docs --inject --output README.md"

[hooks]
postinstall = "prek install"

[settings]
idiomatic_version_file_enable_tools = ["node"]
lockfile = true
